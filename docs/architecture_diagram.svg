  <text x="330" y="289" text-anchor="middle" fill="#8b949e" font-size="8">uav_frames_total</text>
  <text x="330" y="302" text-anchor="middle" fill="#8b949e" font-size="8">uav_inference_latency_seconds</text>
  <text x="330" y="315" text-anchor="middle" fill="#8b949e" font-size="8">uav_cbf_activations_total</text>
  <text x="330" y="328" text-anchor="middle" fill="#8b949e" font-size="8">uav_obstacle_detected_total</text>
