  <text x="320" y="95" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">CAPA 2</text>
  <text x="320" y="110" text-anchor="middle" fill="#c9d1d9" font-size="10">KAFKA STREAMING</text>
