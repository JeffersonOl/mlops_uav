  <text x="320" y="175" text-anchor="middle" fill="#f0883e" font-size="9">uav.cbf.metrics (KPI tesis)</text>

  <!-- Flecha 2→3 -->
  <line x1="415" y1="135" x2="450" y2="135" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

