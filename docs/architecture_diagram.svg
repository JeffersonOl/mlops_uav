  <line x1="150" y1="442" x2="163" y2="442" stroke="#ffa657" stroke-width="1" marker-end="url(#arrow3)"/>
  <line x1="325" y1="442" x2="338" y2="442" stroke="#ffa657" stroke-width="1" marker-end="url(#arrow3)"/>
  <line x1="500" y1="442" x2="513" y2="442" stroke="#ffa657" stroke-width="1" marker-end="url(#arrow3)"/>
  <line x1="675" y1="442" x2="688" y2="442" stroke="#ffa657" stroke-width="1" marker-end="url(#arrow3)"/>

  <!-- IMPACTO SOCIAL -->
  <rect x="10" y="500" width="880" height="60" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="450" y="522" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="bold">IMPACTO SOCIAL — CENACE Ecuador</text>
  <text x="450" y="540" text-anchor="middle" fill="#8b949e" font-size="10">Inspección autónoma de subestaciones eléctricas | Apagones 2024-2026 | UAV indoor GPS-denied</text>
  <text x="450" y="554" text-anchor="middle" fill="#8b949e" font-size="9">Corrida C9: 4/6 KPIs | branch v8.0-research-freeze-20Abr2026 | commit ee2950a</text>

  <!-- Flechas feedback -->
  <line x1="112" y1="350" x2="112" y2="388" stroke="#39d353" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow4)"/>
  <line x1="450" y1="350" x2="450" y2="388" stroke="#a371f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow4)"/>

  <!-- Definición de flechas -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a371f7"/>
    </marker>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffa657"/>
    </marker>
    <marker id="arrow4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
