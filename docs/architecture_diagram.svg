<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="monospace,sans-serif">
  <!-- Fondo -->
  <rect width="900" height="620" fill="#0d1117"/>

  <!-- Título -->
  <rect x="10" y="10" width="880" height="50" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="450" y="32" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">SISTEMA MLOPS — UAV INDOOR NAVIGATION</text>
  <text x="450" y="50" text-anchor="middle" fill="#8b949e" font-size="11">Yachay Tech | Adaptación Arquitectura Apollo | Jefferson Olalla | 2026</text>

  <!-- CAPA 1: DATA SOURCE -->
  <rect x="10" y="75" width="180" height="120" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="100" y="95" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">CAPA 1</text>
  <text x="100" y="110" text-anchor="middle" fill="#c9d1d9" font-size="10">DATA SOURCE</text>
  <rect x="20" y="118" width="160" height="28" rx="4" fill="#1a4731"/>
  <text x="100" y="132" text-anchor="middle" fill="#3fb950" font-size="9">Gazebo + PX4 (UAV sim)</text>
  <text x="100" y="143" text-anchor="middle" fill="#8b949e" font-size="8">≡ /camera/image_raw</text>
  <rect x="20" y="152" width="160" height="28" rx="4" fill="#1a4731"/>
  <text x="100" y="166" text-anchor="middle" fill="#3fb950" font-size="9">Dataset pre-grabado</text>
  <text x="100" y="177" text-anchor="middle" fill="#8b949e" font-size="8">Demo sin Gazebo</text>

  <!-- Flecha 1→2 -->
  <line x1="190" y1="135" x2="225" y2="135" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow)"/>

