  <text x="85" y="438" text-anchor="middle" fill="#ffa657" font-size="9" font-weight="bold">① Lint</text>
  <text x="85" y="452" text-anchor="middle" fill="#8b949e" font-size="8">flake8 check</text>
  <rect x="165" y="420" width="160" height="45" rx="4" fill="#3d2800"/>
  <text x="245" y="438" text-anchor="middle" fill="#ffa657" font-size="9" font-weight="bold">② Test /predict</text>
  <text x="245" y="452" text-anchor="middle" fill="#8b949e" font-size="8">obstacle detection test</text>
  <rect x="340" y="420" width="160" height="45" rx="4" fill="#3d2800"/>
  <text x="420" y="438" text-anchor="middle" fill="#ffa657" font-size="9" font-weight="bold">③ Test /metrics</text>
  <text x="420" y="452" text-anchor="middle" fill="#8b949e" font-size="8">prometheus format test</text>
  <rect x="515" y="420" width="160" height="45" rx="4" fill="#3d2800"/>
  <text x="595" y="438" text-anchor="middle" fill="#ffa657" font-size="9" font-weight="bold">④ Docker Build</text>
  <text x="595" y="452" text-anchor="middle" fill="#8b949e" font-size="8">uav-inference image</text>
  <rect x="690" y="420" width="190" height="45" rx="4" fill="#3d2800"/>
  <text x="785" y="438" text-anchor="middle" fill="#ffa657" font-size="9" font-weight="bold">⑤ Push DockerHub</text>
  <text x="785" y="452" text-anchor="middle" fill="#8b949e" font-size="8">on push to main</text>
