apiVersion: apps/v1
kind: Deployment
metadata:
  name: uav-inference
  labels:
    app: uav-inference
    version: "1.0.0"
    component: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uav-inference
  template:
    metadata:
      labels:
        app: uav-inference
    spec:
      containers:
      - name: uav-inference
        image: uav-inference:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: MODEL_PATH
          value: "/app/best_model.pt"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uav-inference-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uav-inference
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
