version: '3.8'

networks:
  uav-net:
    driver: bridge

services:

  # ── KAFKA INFRASTRUCTURE ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: uav-zookeeper
    networks: [uav-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: uav-kafka
    networks: [uav-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── KAFKA TOPIC INIT ──────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: uav-kafka-init
    networks: [uav-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic uav.camera.frames --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic uav.imu.data --partitions 1 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic uav.cbf.metrics --partitions 1 --replication-factor 1
      echo 'Topics UAV creados OK'
      kafka-topics --list --bootstrap-server kafka:29092
      "

  # ── UAV INFERENCE SERVICE ─────────────────────────
  uav-inference:
    image: uav-inference
    container_name: uav-inference
    networks: [uav-net]
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MODEL_PATH: /app/best_model.pt
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── KAFKA PRODUCER ────────────────────────────────
  kafka-producer:
    image: python:3.11-slim
    container_name: uav-kafka-producer
    networks: [uav-net]
    depends_on:
      kafka:
        condition: service_healthy
      uav-inference:
        condition: service_healthy
    volumes:
      - ./streaming:/app
    working_dir: /app
    environment:
      KAFKA_BROKER: kafka:29092
      PUBLISH_INTERVAL: "0.2"
    command: >
      bash -c "pip install kafka-python numpy requests -q &&
               python kafka_producer.py"

  # ── KAFKA CONSUMER ────────────────────────────────
  kafka-consumer:
    image: python:3.11-slim
    container_name: uav-kafka-consumer
    networks: [uav-net]
    depends_on:
      kafka:
        condition: service_healthy
      uav-inference:
        condition: service_healthy
    volumes:
      - ./streaming:/app
    working_dir: /app
    environment:
      KAFKA_BROKER: kafka:29092
      INFER_URL: http://uav-inference:5000/predict
    command: >
      bash -c "pip install kafka-python numpy requests -q &&
               python kafka_consumer.py"

  # ── PROMETHEUS ────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: uav-prometheus
    networks: [uav-net]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  # ── GRAFANA ───────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    container_name: uav-grafana
    networks: [uav-net]
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: uav2026
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-storage:/var/lib/grafana

volumes:
  grafana-storage:
